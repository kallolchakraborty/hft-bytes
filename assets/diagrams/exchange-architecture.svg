<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="'Ubuntu', sans-serif">
  <rect x="0" y="0" width="1000" height="55" fill="#FF1744"/>
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFF">Exchange Architecture Comparison</text>

  <!-- CME Globex -->
  <rect x="20" y="70" width="317" height="660" rx="8" fill="#FFEBEE" stroke="#FF1744" stroke-width="1.5"/>
  <rect x="20" y="70" width="317" height="35" rx="8" fill="#FF1744"/>
  <text x="178" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">CME Globex</text>

  <!-- Matching Engine -->
  <rect x="35" y="115" width="287" height="70" rx="6" fill="#FFF" stroke="#FF1744" stroke-width="1"/>
  <text x="178" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#FF1744">Matching Engine</text>
  <line x1="48" y1="142" x2="310" y2="142" stroke="#FF1744" stroke-width="0.3"/>
  <text x="178" y="158" text-anchor="middle" font-size="9" fill="#475569">FIFO — price-time priority</text>
  <text x="178" y="173" text-anchor="middle" font-size="9" fill="#475569">EOS (Enhanced Order Server)</text>

  <!-- Components -->
  <rect x="35" y="195" width="287" height="40" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="178" y="215" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">iLink 3 Gateway – Order Entry</text>
  <text x="178" y="229" text-anchor="middle" font-size="8" fill="#64748B">SBE binary protocol, session recovery</text>

  <rect x="35" y="245" width="287" height="40" rx="4" fill="#DCFCE7" stroke="#22C55E" stroke-width="1"/>
  <text x="178" y="265" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">MDP 3.0 – Market Data</text>
  <text x="178" y="279" text-anchor="middle" font-size="8" fill="#64748B">Incremental + Snapshot, TCP + UDP</text>

  <rect x="35" y="295" width="287" height="40" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="178" y="315" text-anchor="middle" font-size="10" font-weight="bold" fill="#B45309">Drop Copy</text>
  <text x="178" y="329" text-anchor="middle" font-size="8" fill="#64748B">Order confirmation, fills, rejections</text>

  <rect x="35" y="345" width="287" height="40" rx="4" fill="#F3E8FF" stroke="#A855F7" stroke-width="1"/>
  <text x="178" y="365" text-anchor="middle" font-size="10" font-weight="bold" fill="#7E22CE">Risk Controls</text>
  <text x="178" y="379" text-anchor="middle" font-size="8" fill="#64748B">Pre-trade, kill switch, credit limits</text>

  <!-- Key specs -->
  <rect x="35" y="400" width="287" height="90" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="178" y="418" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">Key Specifications</text>
  <text x="45" y="438" font-size="9" fill="#475569">• Protocol: iLink 3 (SBE binary)</text>
  <text x="45" y="454" font-size="9" fill="#475569">• Market Data: MDP 3.0 (incremental)</text>
  <text x="45" y="470" font-size="9" fill="#475569">• Matching: FIFO (price-time)</text>
  <text x="45" y="486" font-size="9" fill="#475569">• Round-trip: ~5-7µs (CME colo)</text>

  <!-- Latency -->
  <rect x="35" y="500" width="287" height="40" rx="6" fill="#1E293B"/>
  <text x="178" y="520" text-anchor="middle" font-size="10" font-weight="bold" fill="#22C55E">Total: ~5-7µs round-trip (colo)</text>

  <!-- Fee model -->
  <rect x="35" y="550" width="287" height="65" rx="6" fill="#FEFCE8" stroke="#EAB308" stroke-width="1"/>
  <text x="178" y="570" text-anchor="middle" font-size="10" font-weight="bold" fill="#CA8A04">Fee Model</text>
  <text x="45" y="590" font-size="9" fill="#1e293b">• Taker: $0.55/contract (E-mini ES)</text>
  <text x="45" y="606" font-size="9" fill="#1e293b">• Maker rebate: $0.35/contract</text>

  <!-- Eurex T7 -->
  <rect x="345" y="70" width="317" height="660" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <rect x="345" y="70" width="317" height="35" rx="8" fill="#22C55E"/>
  <text x="503" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">Eurex T7</text>

  <rect x="360" y="115" width="287" height="70" rx="6" fill="#FFF" stroke="#22C55E" stroke-width="1"/>
  <text x="503" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Matching Engine</text>
  <line x1="373" y1="142" x2="635" y2="142" stroke="#22C55E" stroke-width="0.3"/>
  <text x="503" y="158" text-anchor="middle" font-size="9" fill="#475569">Pro-Rata with volume bias</text>
  <text x="503" y="173" text-anchor="middle" font-size="9" fill="#475569">EBS (Enhanced Broadcast Solution)</text>

  <rect x="360" y="195" width="287" height="40" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="503" y="215" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">ETI Gateway – Order Entry</text>
  <text x="503" y="229" text-anchor="middle" font-size="8" fill="#64748B">Binary TCP protocol, session recovery</text>

  <rect x="360" y="245" width="287" height="40" rx="4" fill="#DCFCE7" stroke="#22C55E" stroke-width="1"/>
  <text x="503" y="265" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">EBS – Market Data</text>
  <text x="503" y="279" text-anchor="middle" font-size="8" fill="#64748B">Full order book depth, multicast</text>

  <rect x="360" y="295" width="287" height="40" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="503" y="315" text-anchor="middle" font-size="10" font-weight="bold" fill="#B45309">Drop Copy (on ETI)</text>
  <text x="503" y="329" text-anchor="middle" font-size="8" fill="#64748B">Order fills and status</text>

  <rect x="360" y="345" width="287" height="40" rx="4" fill="#F3E8FF" stroke="#A855F7" stroke-width="1"/>
  <text x="503" y="365" text-anchor="middle" font-size="10" font-weight="bold" fill="#7E22CE">Risk Controls</text>
  <text x="503" y="379" text-anchor="middle" font-size="8" fill="#64748B">Pre-trade, kill switch, price collars</text>

  <rect x="360" y="400" width="287" height="90" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="503" y="418" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">Key Specifications</text>
  <text x="370" y="438" font-size="9" fill="#475569">• Protocol: ETI (binary TCP)</text>
  <text x="370" y="454" font-size="9" fill="#475569">• Market Data: EBS (full depth)</text>
  <text x="370" y="470" font-size="9" fill="#475569">• Matching: Pro-Rata + vol bias</text>
  <text x="370" y="486" font-size="9" fill="#475569">• Round-trip: ~6-10µs (Frankfurt)</text>

  <rect x="360" y="500" width="287" height="40" rx="6" fill="#1E293B"/>
  <text x="503" y="520" text-anchor="middle" font-size="10" font-weight="bold" fill="#22C55E">Total: ~6-10µs round-trip (colo)</text>

  <rect x="360" y="550" width="287" height="65" rx="6" fill="#FEFCE8" stroke="#EAB308" stroke-width="1"/>
  <text x="503" y="570" text-anchor="middle" font-size="10" font-weight="bold" fill="#CA8A04">Fee Model</text>
  <text x="370" y="590" font-size="9" fill="#1e293b">• Taker: €1.80/contract (FDAX)</text>
  <text x="370" y="606" font-size="9" fill="#1e293b">• Maker rebate: €1.70/contract</text>

  <!-- ICE -->
  <rect x="670" y="70" width="310" height="660" rx="8" fill="#FFF3ED" stroke="#EA580C" stroke-width="1.5"/>
  <rect x="670" y="70" width="310" height="35" rx="8" fill="#EA580C"/>
  <text x="825" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">ICE</text>

  <rect x="685" y="115" width="280" height="70" rx="6" fill="#FFF" stroke="#EA580C" stroke-width="1"/>
  <text x="825" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#9A3412">Matching Engine</text>
  <line x1="698" y1="142" x2="952" y2="142" stroke="#EA580C" stroke-width="0.3"/>
  <text x="825" y="158" text-anchor="middle" font-size="9" fill="#475569">FIFO — price-time priority</text>
  <text x="825" y="173" text-anchor="middle" font-size="9" fill="#475569">ICE Global Network</text>

  <rect x="685" y="195" width="280" height="40" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="825" y="215" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">ICE FIX Gateway</text>
  <text x="825" y="229" text-anchor="middle" font-size="8" fill="#64748B">Binary &amp; FIX 4.4, session recovery</text>

  <rect x="685" y="245" width="280" height="40" rx="4" fill="#DCFCE7" stroke="#22C55E" stroke-width="1"/>
  <text x="825" y="265" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Market Data Feed</text>
  <text x="825" y="279" text-anchor="middle" font-size="8" fill="#64748B">Binary protocol, multicast</text>

  <rect x="685" y="295" width="280" height="40" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="825" y="315" text-anchor="middle" font-size="10" font-weight="bold" fill="#B45309">Drop Copy</text>
  <text x="825" y="329" text-anchor="middle" font-size="8" fill="#64748B">Order fills and status</text>

  <rect x="685" y="345" width="280" height="40" rx="4" fill="#F3E8FF" stroke="#A855F7" stroke-width="1"/>
  <text x="825" y="365" text-anchor="middle" font-size="10" font-weight="bold" fill="#7E22CE">Risk Controls</text>
  <text x="825" y="379" text-anchor="middle" font-size="8" fill="#64748B">Pre-trade, position limits</text>

  <rect x="685" y="400" width="280" height="90" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="825" y="418" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">Key Specifications</text>
  <text x="695" y="438" font-size="9" fill="#475569">• Protocol: ICE Binary / FIX 4.4</text>
  <text x="695" y="454" font-size="9" fill="#475569">• Market Data: Binary multicast</text>
  <text x="695" y="470" font-size="9" fill="#475569">• Matching: FIFO (price-time)</text>
  <text x="695" y="486" font-size="9" fill="#475569">• Round-trip: ~8-12µs</text>

  <rect x="685" y="500" width="280" height="40" rx="6" fill="#1E293B"/>
  <text x="825" y="520" text-anchor="middle" font-size="10" font-weight="bold" fill="#22C55E">Total: ~8-12µs round-trip</text>

  <rect x="685" y="550" width="280" height="65" rx="6" fill="#FEFCE8" stroke="#EAB308" stroke-width="1"/>
  <text x="825" y="570" text-anchor="middle" font-size="10" font-weight="bold" fill="#CA8A04">Fee Model</text>
  <text x="695" y="590" font-size="9" fill="#1e293b">• Taker: $0.02/barrel (Crude)</text>
  <text x="695" y="606" font-size="9" fill="#1e293b">• Maker: $0.01/barrel rebate</text>
</svg>
