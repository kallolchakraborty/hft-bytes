<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="'Ubuntu', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#FF1744"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="55" fill="#FF1744"/>
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFF">Latency Cost Curve — ROI per Microsecond</text>

  <!-- Chart area -->
  <rect x="30" y="70" width="940" height="660" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="500" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#FF1744">Revenue Capture Decay as a Function of Latency</text>
  <line x1="50" y1="98" x2="950" y2="98" stroke="#CBD5E1" stroke-width="0.5"/>

  <!-- Y axis -->
  <line x1="100" y1="120" x2="100" y2="620" stroke="#475569" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="100" y1="620" x2="930" y2="620" stroke="#475569" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="40" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569" transform="rotate(-90,40,370)">Revenue / Profit ($)</text>

  <!-- X axis labels -->
  <text x="100" y="640" text-anchor="middle" font-size="8" fill="#64748B">0</text>
  <text x="210" y="640" text-anchor="middle" font-size="8" fill="#64748B">1µs</text>
  <line x1="210" y1="618" x2="210" y2="622" stroke="#CBD5E1" stroke-width="1"/>

  <text x="320" y="640" text-anchor="middle" font-size="8" fill="#64748B">10µs</text>
  <line x1="320" y1="618" x2="320" y2="622" stroke="#CBD5E1" stroke-width="1"/>

  <text x="450" y="640" text-anchor="middle" font-size="8" fill="#64748B">100µs</text>
  <line x1="450" y1="618" x2="450" y2="622" stroke="#CBD5E1" stroke-width="1"/>

  <text x="580" y="640" text-anchor="middle" font-size="8" fill="#64748B">1ms</text>
  <line x1="580" y1="618" x2="580" y2="622" stroke="#CBD5E1" stroke-width="1"/>

  <text x="730" y="640" text-anchor="middle" font-size="8" fill="#64748B">10ms</text>
  <line x1="730" y1="618" x2="730" y2="622" stroke="#CBD5E1" stroke-width="1"/>

  <text x="880" y="640" text-anchor="middle" font-size="8" fill="#64748B">100ms</text>
  <line x1="880" y1="618" x2="880" y2="622" stroke="#CBD5E1" stroke-width="1"/>

  <text x="515" y="665" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">Latency (log scale — microseconds to milliseconds)</text>

  <!-- X axis log scale ticks (minor) -->
  <line x1="145" y1="618" x2="145" y2="622" stroke="#CBD5E1" stroke-width="0.5"/>
  <line x1="175" y1="618" x2="175" y2="622" stroke="#CBD5E1" stroke-width="0.5"/>
  <line x1="240" y1="618" x2="240" y2="622" stroke="#CBD5E1" stroke-width="0.5"/>
  <line x1="265" y1="618" x2="265" y2="622" stroke="#CBD5E1" stroke-width="0.5"/>
  <line x1="290" y1="618" x2="290" y2="622" stroke="#CBD5E1" stroke-width="0.5"/>

  <!-- Curve 1: Rebate Capture (green) -->
  <path d="M100,200 Q210,220 320,250 Q450,350 580,480 Q730,580 880,610" fill="none" stroke="#22C55E" stroke-width="3"/>
  <rect x="780" y="440" width="150" height="22" rx="4" fill="#DCFCE7" stroke="#22C55E" stroke-width="1"/>
  <text x="855" y="455" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">Rebate Capture</text>

  <!-- Curve 2: Arbitrage (blue) -->
  <path d="M100,280 Q210,300 320,340 Q450,420 580,520 Q730,600 880,615" fill="none" stroke="#3B82F6" stroke-width="3" stroke-dasharray="8,4"/>
  <rect x="780" y="470" width="150" height="22" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="855" y="485" text-anchor="middle" font-size="9" font-weight="bold" fill="#1E40AF">Arbitrage</text>

  <!-- Curve 3: Latency-Sensitive (red) -->
  <path d="M100,350 Q210,380 320,450 Q450,530 580,580 Q730,610 880,620" fill="none" stroke="#EF4444" stroke-width="3" stroke-dasharray="4,3"/>
  <rect x="770" y="500" width="170" height="22" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="855" y="515" text-anchor="middle" font-size="9" font-weight="bold" fill="#991B1B">Latency-Sensitive Flow</text>

  <!-- Break-even points -->
  <circle cx="210" cy="250" r="5" fill="#FF1744"/>
  <line x1="210" y1="250" x2="210" y2="625" stroke="#FF1744" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="100" y1="250" x2="205" y2="250" stroke="#FF1744" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="180" y="660" text-anchor="middle" font-size="8" font-weight="bold" fill="#FF1744">FPGA</text>

  <circle cx="320" cy="340" r="5" fill="#A855F7"/>
  <line x1="320" y1="340" x2="320" y2="625" stroke="#A855F7" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="100" y1="340" x2="315" y2="340" stroke="#A855F7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="305" y="660" text-anchor="middle" font-size="8" font-weight="bold" fill="#A855F7">CPU Bypass</text>

  <circle cx="450" cy="420" r="5" fill="#F59E0B"/>
  <line x1="450" y1="420" x2="450" y2="625" stroke="#F59E0B" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="100" y1="420" x2="445" y2="420" stroke="#F59E0B" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="440" y="660" text-anchor="middle" font-size="8" font-weight="bold" fill="#F59E0B">SW Optimize</text>

  <!-- ROI Analysis boxes -->
  <rect x="50" y="460" width="420" height="95" rx="6" fill="#1E293B"/>
  <text x="70" y="482" font-size="10" font-weight="bold" fill="#94A3B8">ROI Calculation: Cost of Latency Reduction</text>
  <text x="70" y="502" font-size="9" fill="#22C55E">// Annual profit from 1µs latency reduction</text>
  <text x="70" y="522" font-size="9" fill="#94A3B8">latency_revenue = current_profit × (new_latency / old_latency)^elasticity</text>
  <text x="70" y="542" font-size="9" fill="#94A3B8">Example: 5µs → 1µs @ 80% elasticity = 4x profit increase</text>

  <rect x="490" y="460" width="460" height="95" rx="6" fill="#F3E8FF" stroke="#A855F7" stroke-width="1"/>
  <text x="720" y="482" text-anchor="middle" font-size="10" font-weight="bold" fill="#7E22CE">Investment Decision Matrix</text>
  <line x1="505" y1="488" x2="935" y2="488" stroke="#A855F7" stroke-width="0.5"/>
  <text x="505" y="508" font-size="9" fill="#1e293b">FPGA: $15K card + $50K dev → 250ns → break-even in 2-4 months</text>
  <text x="505" y="526" font-size="9" fill="#1e293b">Kernel bypass: $0 (DPDK) to $10K (Onload) → 1µs → break-even in 1-2 months</text>
  <text x="505" y="544" font-size="9" fill="#1e293b">Software optimization: dev time only → 2µs → highest ROI per $</text>

  <!-- Additional detail boxes -->
  <rect x="50" y="575" width="290" height="140" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="195" y="595" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">Rebate Capture Strategy</text>
  <line x1="65" y1="601" x2="325" y2="601" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="65" y="620" font-size="9" fill="#1e293b">• Earn rebate by providing liquidity</text>
  <text x="65" y="638" font-size="9" fill="#1e293b">• Best bid/ask at front of queue</text>
  <text x="65" y="656" font-size="9" fill="#1e293b">• Latency determines queue position</text>
  <text x="65" y="674" font-size="9" fill="#1e293b">• 1µs faster = $1-5M/yr (ES futures)</text>
  <text x="65" y="692" font-size="9" fill="#1e293b">• Returns decay to zero after 10µs</text>

  <rect x="355" y="575" width="290" height="140" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="500" y="595" text-anchor="middle" font-size="10" font-weight="bold" fill="#B45309">Latency Arbitrage</text>
  <line x1="370" y1="601" x2="630" y2="601" stroke="#F59E0B" stroke-width="0.5"/>
  <text x="370" y="620" font-size="9" fill="#1e293b">• Cross-venue price difference capture</text>
  <text x="370" y="638" font-size="9" fill="#1e293b">• Venue A moves → trade Venue B before</text>
  <text x="370" y="656" font-size="9" fill="#1e293b">• Latency differential is the edge</text>
  <text x="370" y="674" font-size="9" fill="#1e293b">• ~2µs window = profitable (co-lo)</text>
  <text x="370" y="692" font-size="9" fill="#1e293b">• Zero after ~50µs (everyone reacts)</text>

  <rect x="660" y="575" width="290" height="140" rx="6" fill="#F3E8FF" stroke="#A855F7" stroke-width="1"/>
  <text x="805" y="595" text-anchor="middle" font-size="10" font-weight="bold" fill="#7E22CE">The Latency Arms Race</text>
  <line x1="675" y1="601" x2="935" y2="601" stroke="#A855F7" stroke-width="0.5"/>
  <text x="675" y="620" font-size="9" fill="#1e293b">• 2010: 10ms was fast (Colo NY)</text>
  <text x="675" y="638" font-size="9" fill="#1e293b">• 2015: 10µs (kernel bypass + co-lo)</text>
  <text x="675" y="656" font-size="9" fill="#1e293b">• 2020: 1µs (FPGA + microwave)</text>
  <text x="675" y="674" font-size="9" fill="#1e293b">• 2024: sub-100ns (on-FPGA trading)</text>
  <text x="675" y="692" font-size="9" fill="#1e293b">• Marginal gain per $ is diminishing</text>
</svg>
