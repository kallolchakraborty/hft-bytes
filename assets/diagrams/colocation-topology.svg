<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="'Ubuntu', sans-serif">
  <rect x="0" y="0" width="1000" height="55" fill="#FF1744"/>
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFF">Colocation Topology — Exchange Data Center Layout</text>

  <!-- Exchange Cabinet -->
  <rect x="30" y="70" width="940" height="660" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="500" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#FF1744">Exchange Data Center Colo Cage</text>
  <line x1="50" y1="98" x2="950" y2="98" stroke="#CBD5E1" stroke-width="0.5"/>

  <!-- Exchange Cabinet -->
  <rect x="700" y="120" width="250" height="200" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <rect x="700" y="120" width="250" height="30" rx="8" fill="#EF4444"/>
  <text x="825" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFF">Exchange Cabinet</text>

  <rect x="715" y="160" width="110" height="45" rx="4" fill="#FFF" stroke="#DC2626" stroke-width="1"/>
  <text x="770" y="182" text-anchor="middle" font-size="9" font-weight="bold" fill="#991B1B">Matching Engine</text>
  <text x="770" y="196" text-anchor="middle" font-size="8" fill="#64748B">Primary</text>

  <rect x="835" y="160" width="100" height="45" rx="4" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
  <text x="885" y="182" text-anchor="middle" font-size="9" font-weight="bold" fill="#475569">Matching Engine</text>
  <text x="885" y="196" text-anchor="middle" font-size="8" fill="#64748B">Standby</text>

  <rect x="715" y="215" width="220" height="40" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="825" y="235" text-anchor="middle" font-size="9" font-weight="bold" fill="#B45309">Market Data Feed Server</text>

  <rect x="715" y="265" width="220" height="40" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="825" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="#1E40AF">Order Gateway (iLink/ETI)</text>

  <!-- Cross Connect Panel -->
  <rect x="700" y="345" width="250" height="50" rx="6" fill="#EDE9FE" stroke="#A855F7" stroke-width="1.5"/>
  <text x="825" y="367" text-anchor="middle" font-size="10" font-weight="bold" fill="#7E22CE">Cross-Connect Panel</text>
  <text x="825" y="383" text-anchor="middle" font-size="8" fill="#64748B">Fiber patch panel — LC connectors</text>

  <!-- Cross connect line -->
  <line x1="700" y1="370" x2="660" y2="370" stroke="#A855F7" stroke-width="2"/>

  <!-- HFT Server Rack -->
  <rect x="50" y="120" width="250" height="400" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <rect x="50" y="120" width="250" height="30" rx="8" fill="#22C55E"/>
  <text x="175" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFF">HFT Server Rack</text>

  <!-- Servers -->
  <rect x="65" y="160" width="220" height="60" rx="4" fill="#FFF" stroke="#22C55E" stroke-width="1"/>
  <text x="175" y="180" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">Server 1 — Market Data Handler</text>
  <text x="175" y="196" text-anchor="middle" font-size="8" fill="#64748B">NIC-A | NIC-B | DPDK/Onload</text>

  <rect x="65" y="230" width="220" height="60" rx="4" fill="#FFF" stroke="#22C55E" stroke-width="1"/>
  <text x="175" y="250" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">Server 2 — Strategy Engine</text>
  <text x="175" y="266" text-anchor="middle" font-size="8" fill="#64748B">Signal gen, risk, order gen</text>

  <rect x="65" y="300" width="220" height="60" rx="4" fill="#FFF" stroke="#22C55E" stroke-width="1"/>
  <text x="175" y="320" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">Server 3 — Order Sender</text>
  <text x="175" y="336" text-anchor="middle" font-size="8" fill="#64748B">iLink 3 / ETI / ICE Gateway</text>

  <rect x="65" y="370" width="220" height="60" rx="4" fill="#FFF" stroke="#22C55E" stroke-width="1"/>
  <text x="175" y="390" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">Server 4 — Logging &amp; Monitor</text>
  <text x="175" y="406" text-anchor="middle" font-size="8" fill="#64748B">Drop copy, latency histogram</text>

  <!-- ToR Switch A -->
  <rect x="350" y="130" width="200" height="60" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="450" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">ToR Switch A</text>
  <text x="450" y="170" text-anchor="middle" font-size="9" fill="#475569">Primary path, cut-through</text>

  <!-- ToR Switch B -->
  <rect x="350" y="210" width="200" height="60" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="2"/>
  <text x="450" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">ToR Switch B</text>
  <text x="450" y="250" text-anchor="middle" font-size="9" fill="#64748B">Redundant path (standby)</text>

  <!-- Redundant Power -->
  <rect x="50" y="540" width="920" height="180" rx="8" fill="#FEFCE8" stroke="#EAB308" stroke-width="1.5"/>
  <text x="510" y="562" text-anchor="middle" font-size="12" font-weight="bold" fill="#CA8A04">Redundant Power Infrastructure</text>
  <line x1="70" y1="568" x2="950" y2="568" stroke="#EAB308" stroke-width="0.5"/>

  <!-- UPS -->
  <rect x="70" y="585" width="200" height="55" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="170" y="607" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E40AF">UPS A (Online)</text>
  <text x="170" y="625" text-anchor="middle" font-size="8" fill="#64748B">Batteries, 10 min runtime</text>

  <rect x="300" y="585" width="200" height="55" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
  <text x="400" y="607" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">UPS B (Standby)</text>
  <text x="400" y="625" text-anchor="middle" font-size="8" fill="#64748B">Batteries, 10 min runtime</text>

  <rect x="530" y="585" width="200" height="55" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="630" y="607" text-anchor="middle" font-size="10" font-weight="bold" fill="#991B1B">Generator</text>
  <text x="630" y="625" text-anchor="middle" font-size="8" fill="#64748B">Diesel, 48hr+ fuel</text>

  <rect x="760" y="585" width="180" height="55" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="850" y="607" text-anchor="middle" font-size="10" font-weight="bold" fill="#B45309">PDU (A+B Feed)</text>
  <text x="850" y="625" text-anchor="middle" font-size="8" fill="#64748B">Dual power strips</text>

  <text x="70" y="670" font-size="9" fill="#64748B">• Dual power feeds from separate substations → ATS → UPS → PDU → Server (dual PSU)</text>
  <text x="70" y="690" font-size="9" fill="#64748B">• N+1 redundancy for all cooling, switching, and power components</text>
  <text x="70" y="710" font-size="9" fill="#64748B">• Typical colo: NY4 (NJ), LD4 (London), FR2 (Frankfurt), CME Aurora (IL)</text>
</svg>
