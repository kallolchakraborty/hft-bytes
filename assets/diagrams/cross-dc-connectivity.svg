<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="'Ubuntu', sans-serif">
  <rect x="0" y="0" width="1000" height="55" fill="#FF1744"/>
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFF">Cross-Datacenter Connectivity — Site A → Site B</text>

  <!-- Site A -->
  <rect x="30" y="70" width="350" height="380" rx="8" fill="#FFEBEE" stroke="#FF1744" stroke-width="2"/>
  <rect x="30" y="70" width="350" height="30" rx="8" fill="#FF1744"/>
  <text x="205" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFF">Site A — Primary Colo (NY4/NJ)</text>

  <!-- Trading stack -->
  <rect x="45" y="112" width="320" height="35" rx="4" fill="#DCFCE7" stroke="#22C55E" stroke-width="1"/>
  <text x="205" y="132" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">Trading App (Active — Primary)</text>

  <rect x="45" y="157" width="320" height="35" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="205" y="177" text-anchor="middle" font-size="9" font-weight="bold" fill="#1E40AF">State Replication</text>

  <rect x="45" y="202" width="320" height="35" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="205" y="222" text-anchor="middle" font-size="9" font-weight="bold" fill="#B45309">Market Data Feed Handlers</text>

  <rect x="45" y="247" width="320" height="35" rx="4" fill="#EDE9FE" stroke="#A855F7" stroke-width="1"/>
  <text x="205" y="267" text-anchor="middle" font-size="9" font-weight="bold" fill="#7E22CE">Order Gateway (iLink/ETI/ICE)</text>

  <rect x="45" y="292" width="320" height="35" rx="4" fill="#F3E8FF" stroke="#A855F7" stroke-width="1"/>
  <text x="205" y="312" text-anchor="middle" font-size="9" font-weight="bold" fill="#7E22CE">Risk + Position Management</text>

  <!-- Network Gear -->
  <rect x="45" y="345" width="150" height="40" rx="4" fill="#1E293B"/>
  <text x="120" y="365" text-anchor="middle" font-size="9" font-weight="bold" fill="#22C55E">ToR Switch A</text>

  <rect x="210" y="345" width="150" height="40" rx="4" fill="#1E293B"/>
  <text x="285" y="365" text-anchor="middle" font-size="9" font-weight="bold" fill="#22C55E">WAN Router A</text>

  <!-- Cross-Connect -->
  <rect x="45" y="400" width="320" height="35" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="205" y="420" text-anchor="middle" font-size="9" font-weight="bold" fill="#991B1B">Cross-Connect Panel (fiber patch)</text>

  <!-- Connection line between sites -->
  <rect x="380" y="200" width="240" height="70" rx="8" fill="#FEFCE8" stroke="#EAB308" stroke-width="2"/>
  <text x="500" y="222" text-anchor="middle" font-size="10" font-weight="bold" fill="#CA8A04">WAN Link (DWDM / Dark Fiber)</text>
  <text x="500" y="240" text-anchor="middle" font-size="9" fill="#1e293b">Distance: ~50km (campus)</text>
  <text x="500" y="258" text-anchor="middle" font-size="9" fill="#1e293b">Latency: ~500µs round-trip</text>

  <line x1="380" y1="235" x2="355" y2="235" stroke="#EAB308" stroke-width="2"/>
  <polygon points="357,228 347,235 357,242" fill="#EAB308"/>

  <line x1="620" y1="235" x2="645" y2="235" stroke="#EAB308" stroke-width="2"/>
  <polygon points="643,228 653,235 643,242" fill="#EAB308"/>

  <!-- Site B -->
  <rect x="620" y="70" width="350" height="380" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <rect x="620" y="70" width="350" height="30" rx="8" fill="#22C55E"/>
  <text x="795" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFF">Site B — DR Colo (CHI/IL)</text>

  <rect x="635" y="112" width="320" height="35" rx="4" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
  <text x="795" y="132" text-anchor="middle" font-size="9" font-weight="bold" fill="#475569">Trading App (Standby — DR)</text>

  <rect x="635" y="157" width="320" height="35" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
  <text x="795" y="177" text-anchor="middle" font-size="9" font-weight="bold" fill="#1E40AF">State Replication (Consumer)</text>

  <rect x="635" y="202" width="320" height="35" rx="4" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
  <text x="795" y="222" text-anchor="middle" font-size="9" fill="#475569">Market Data (backup feeds)</text>

  <rect x="635" y="247" width="320" height="35" rx="4" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
  <text x="795" y="267" text-anchor="middle" font-size="9" fill="#475569">Order Gateway (standby)</text>

  <rect x="635" y="292" width="320" height="35" rx="4" fill="#F3E8FF" stroke="#A855F7" stroke-width="1"/>
  <text x="795" y="312" text-anchor="middle" font-size="9" fill="#7E22CE">Risk + Position (synced)</text>

  <rect x="635" y="345" width="150" height="40" rx="4" fill="#1E293B"/>
  <text x="710" y="365" text-anchor="middle" font-size="9" font-weight="bold" fill="#22C55E">WAN Router B</text>

  <rect x="800" y="345" width="150" height="40" rx="4" fill="#1E293B"/>
  <text x="875" y="365" text-anchor="middle" font-size="9" font-weight="bold" fill="#22C55E">ToR Switch B</text>

  <rect x="635" y="400" width="320" height="35" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="795" y="420" text-anchor="middle" font-size="9" font-weight="bold" fill="#991B1B">Cross-Connect Panel (fiber patch)</text>

  <!-- State Replication detail -->
  <rect x="30" y="465" width="940" height="265" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="500" y="487" text-anchor="middle" font-size="12" font-weight="bold" fill="#FF1744">State Replication — Synchronous WAN</text>
  <line x1="50" y1="493" x2="950" y2="493" stroke="#CBD5E1" stroke-width="0.5"/>

  <rect x="50" y="505" width="440" height="100" rx="6" fill="#1E293B"/>
  <text x="70" y="527" font-size="10" font-weight="bold" fill="#94A3B8">State Replication Protocol</text>
  <text x="70" y="547" font-size="9" fill="#22C55E">// Primary logs each order event → WAN → Standby</text>
  <text x="70" y="567" font-size="9" fill="#94A3B8">struct ReplicatedEvent {</text>
  <text x="90" y="587" font-size="9" fill="#94A3B8">  int64_t  seq_num;     <tspan fill="#64748B">// Monotonic global sequence</tspan></text>
  <text x="90" y="603" font-size="9" fill="#94A3B8">  uint8_t  event_type;  <tspan fill="#64748B">// NEW=1, FILL=2, CANCEL=3, POSITION=4</tspan></text>
  <text x="90" y="619" font-size="9" fill="#94A3B8">  uint8_t  data[256];   <tspan fill="#64748B">// Serialized event payload</tspan></text>
  <text x="70" y="635" font-size="9" fill="#94A3B8">};</text>

  <rect x="510" y="505" width="440" height="100" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="730" y="527" text-anchor="middle" font-size="10" font-weight="bold" fill="#B45309">Synchronous Replication Flow</text>
  <line x1="525" y1="533" x2="935" y2="533" stroke="#F59E0B" stroke-width="0.5"/>
  <text x="730" y="552" text-anchor="middle" font-size="9" fill="#1e293b">1. Primary receives market data event</text>
  <text x="730" y="570" text-anchor="middle" font-size="9" fill="#1e293b">2. Primary executes strategy, sends order</text>
  <text x="730" y="588" text-anchor="middle" font-size="9" fill="#1e293b">3. Primary logs event → replicates to standby</text>
  <text x="730" y="606" text-anchor="middle" font-size="9" fill="#1e293b">4. Standby ACKs after writing to local log</text>

  <!-- WAN latency measurement -->
  <rect x="50" y="620" width="440" height="95" rx="6" fill="#EDE9FE" stroke="#A855F7" stroke-width="1"/>
  <text x="270" y="640" text-anchor="middle" font-size="10" font-weight="bold" fill="#7E22CE">WAN Latency Measurement Points</text>
  <line x1="65" y1="646" x2="475" y2="646" stroke="#A855F7" stroke-width="0.5"/>
  <text x="65" y="666" font-size="9" fill="#1e293b">• Between ToR switch and WAN router (nanoseconds)</text>
  <text x="65" y="684" font-size="9" fill="#1e293b">• WAN router → DWDM mux → fiber → far end (microseconds)</text>
  <text x="65" y="702" font-size="9" fill="#1e293b">• Measure with PTP / SyncE / one-way delay measurement</text>

  <rect x="510" y="620" width="440" height="95" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
  <text x="730" y="640" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Latency Budget (50km WAN)</text>
  <line x1="525" y1="646" x2="935" y2="646" stroke="#22C55E" stroke-width="0.5"/>
  <text x="525" y="666" font-size="9" fill="#1e293b">• Fiber: ~5ns/m → 50km = 250µs one-way</text>
  <text x="525" y="684" font-size="9" fill="#1e293b">• DWDM mux/demux latency: ~50µs</text>
  <text x="525" y="702" font-size="9" fill="#1e293b">• Total one-way replication: ~300µs</text>
</svg>
